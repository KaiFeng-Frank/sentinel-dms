<?xml version="1.0" encoding="UTF-8"?>
<!-- ViewBox 1680x1190 matches A4 landscape √2 ratio. At full-page A4 print
     (297x210 mm), 1 unit = 0.177 mm. Body text at 22 units = 11 pt;
     card titles at 44 units = 22 pt; hero title at 80 units = 40 pt. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1680 1190" font-family="SF Pro Display, Helvetica Neue, Inter, Ubuntu Sans, system-ui, sans-serif">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f1f5"/>
    </linearGradient>
    <linearGradient id="pillBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#007aff"/>
      <stop offset="100%" stop-color="#5ac8fa"/>
    </linearGradient>
    <linearGradient id="pillViolet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#af52de"/>
      <stop offset="100%" stop-color="#bf5af2"/>
    </linearGradient>
    <linearGradient id="pillGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34c759"/>
      <stop offset="100%" stop-color="#30d158"/>
    </linearGradient>

    <filter id="cardShadow" x="-12%" y="-12%" width="124%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="s1"/>
      <feFlood flood-color="#0b1220" flood-opacity="0.09"/>
      <feComposite in2="s1" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <marker id="arrowBlue" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1 L11 6 L1 11 z" fill="#007aff"/>
    </marker>
    <marker id="arrowViolet" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1 L11 6 L1 11 z" fill="#af52de"/>
    </marker>
    <marker id="arrowDark" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1 L11 6 L1 11 z" fill="#1c1c1e"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M1 1 L11 6 L1 11 z" fill="#34c759"/>
    </marker>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1680" height="1190" fill="url(#pageBg)"/>

  <!-- HEADER -->
  <g transform="translate(50, 56)">
    <text x="0" y="0" font-size="52" font-weight="900" fill="#007aff">◈</text>
    <text x="66" y="-3" font-size="40" font-weight="900" fill="#1c1c1e" letter-spacing="6">SENTINEL</text>
    <text x="66" y="32" font-size="18" font-weight="800" fill="#8e8e93" letter-spacing="4">DRIVER MONITORING SYSTEM</text>
  </g>
  <g transform="translate(1630, 56)" text-anchor="end">
    <text x="0" y="-3" font-size="20" font-weight="800" fill="#48484a" letter-spacing="3.5">SYSTEM ARCHITECTURE</text>
    <text x="0" y="30" font-size="17" font-weight="800" fill="#8e8e93" letter-spacing="3">v1.0  ·  DUAL-LOOP  ·  REV A</text>
  </g>

  <!-- TITLE -->
  <g transform="translate(840, 180)" text-anchor="middle">
    <text x="0" y="0" font-size="66" font-weight="900" fill="#1c1c1e" letter-spacing="-0.8">Dual-Loop Driver Monitoring Architecture</text>
    <text x="0" y="46" font-size="26" font-weight="500" fill="#48484a" letter-spacing="1">Millisecond-reflex physiology  ·  paired with  ·  continuous vision-language reasoning</text>
  </g>

  <!-- ============ MAIN FLOW ============ -->
  <!-- x positions: Camera 50-270, Fast/Slow 310-930, Fusion 970-1260, Unified/Downstream 1300-1640 -->

  <!-- STAGE 1 — CAMERA INPUT -->
  <g transform="translate(50, 380)" filter="url(#cardShadow)">
    <rect width="220" height="300" rx="22" ry="22" fill="#ffffff" stroke="#e5e5ea" stroke-width="1.2"/>
    <rect x="0" y="34" width="5" height="232" rx="2.5" ry="2.5" fill="#5ac8fa"/>
    <text x="110" y="52" text-anchor="middle" font-size="16" font-weight="900" fill="#8e8e93" letter-spacing="3">STAGE 01  ·  INPUT</text>
    <g transform="translate(110, 148)">
      <rect x="-56" y="-34" width="112" height="68" rx="10" ry="10" fill="none" stroke="#007aff" stroke-width="3"/>
      <circle cx="0" cy="0" r="26" fill="none" stroke="#007aff" stroke-width="3"/>
      <circle cx="0" cy="0" r="12" fill="#007aff"/>
      <rect x="32" y="-26" width="14" height="5" rx="1" fill="#007aff"/>
    </g>
    <text x="110" y="222" text-anchor="middle" font-size="26" font-weight="900" fill="#1c1c1e" letter-spacing="0.8">CABIN CAMERA</text>
    <text x="110" y="252" text-anchor="middle" font-size="17" font-weight="800" fill="#48484a" letter-spacing="2">RGB · 640 × 480 · 30 FPS</text>
    <text x="110" y="278" text-anchor="middle" font-size="15" font-weight="700" fill="#8e8e93" letter-spacing="1.5">SINGLE LOW-COST SENSOR</text>
  </g>

  <!-- STAGE 2A — FAST LOOP -->
  <g transform="translate(310, 270)" filter="url(#cardShadow)">
    <rect width="580" height="250" rx="26" ry="26" fill="#ffffff" stroke="#e5e5ea" stroke-width="1.2"/>
    <rect x="0" y="38" width="5" height="184" rx="2.5" ry="2.5" fill="#007aff"/>
    <!-- pill -->
    <rect x="390" y="26" width="170" height="36" rx="18" ry="18" fill="url(#pillBlue)"/>
    <text x="475" y="50" text-anchor="middle" font-size="17" font-weight="900" fill="#ffffff" letter-spacing="2.2">30 FPS · &lt; 50 ms</text>
    <!-- header -->
    <text x="30" y="58" font-size="18" font-weight="900" fill="#007aff" letter-spacing="3.4">◉  STAGE 02A  ·  FAST LOOP</text>
    <text x="30" y="104" font-size="40" font-weight="900" fill="#1c1c1e" letter-spacing="-0.3">Reflex Physiology</text>
    <!-- components -->
    <g font-size="22" font-weight="600" fill="#48484a" letter-spacing="0.2">
      <text x="30" y="148"><tspan font-weight="900" fill="#1c1c1e">MediaPipe FaceMesh</tspan>  —  468 landmarks</text>
      <text x="30" y="180"><tspan font-weight="900" fill="#1c1c1e">YOLOv8 dual head</tspan>  —  eye + yawn classifier</text>
      <text x="30" y="212"><tspan font-weight="900" fill="#1c1c1e">EAR + PERCLOS</tspan>  —  6-point ratio, 10 s window</text>
      <text x="30" y="240"><tspan font-weight="900" fill="#1c1c1e">Fast score 0–10</tspan>  —  microsleep + yawn blend</text>
    </g>
  </g>

  <!-- STAGE 2B — SLOW LOOP -->
  <g transform="translate(310, 560)" filter="url(#cardShadow)">
    <rect width="580" height="250" rx="26" ry="26" fill="#ffffff" stroke="#e5e5ea" stroke-width="1.2"/>
    <rect x="0" y="38" width="5" height="184" rx="2.5" ry="2.5" fill="#af52de"/>
    <rect x="400" y="26" width="160" height="36" rx="18" ry="18" fill="url(#pillViolet)"/>
    <text x="480" y="50" text-anchor="middle" font-size="17" font-weight="900" fill="#ffffff" letter-spacing="2.2">~ 0.3 Hz  ·  3 s</text>
    <text x="30" y="58" font-size="18" font-weight="900" fill="#af52de" letter-spacing="3.4">◆  STAGE 02B  ·  SLOW LOOP</text>
    <text x="30" y="104" font-size="40" font-weight="900" fill="#1c1c1e" letter-spacing="-0.3">Semantic Reasoning</text>
    <g font-size="22" font-weight="600" fill="#48484a" letter-spacing="0.2">
      <text x="30" y="142"><tspan font-weight="900" fill="#1c1c1e">Qwen3.5-Omni VLM</tspan>  —  vision-language backbone</text>
      <text x="30" y="172"><tspan font-weight="900" fill="#1c1c1e">5 JSON dims</tspan>  —  strict structured schema</text>
      <text x="30" y="202" font-size="18" fill="#5a5a5e" letter-spacing="0.1">drowsy · distract · anomaly · occlusion · context</text>
      <text x="30" y="234"><tspan font-weight="900" fill="#1c1c1e">Overall risk</tspan>  +  NL brief  +  action</text>
    </g>
  </g>

  <!-- STAGE 3 — DECISION FUSION -->
  <g transform="translate(970, 370)" filter="url(#cardShadow)">
    <rect width="290" height="440" rx="26" ry="26" fill="#ffffff" stroke="#e5e5ea" stroke-width="1.4"/>
    <rect x="0" y="50" width="5" height="340" rx="2.5" ry="2.5" fill="#1c1c1e"/>
    <text x="145" y="58" text-anchor="middle" font-size="16" font-weight="900" fill="#48484a" letter-spacing="3.2">STAGE 03  ·  FUSION</text>
    <text x="145" y="118" text-anchor="middle" font-size="36" font-weight="900" fill="#1c1c1e" letter-spacing="-0.2">Decision Fusion</text>
    <text x="145" y="152" text-anchor="middle" font-size="18" font-weight="600" fill="#48484a" letter-spacing="0.2">Confidence-weighted</text>
    <text x="145" y="176" text-anchor="middle" font-size="18" font-weight="600" fill="#48484a" letter-spacing="0.2">drowsiness blend</text>
    <line x1="32" y1="204" x2="258" y2="204" stroke="#e5e5ea" stroke-width="1.2"/>
    <g font-size="20" font-weight="800" fill="#1c1c1e" letter-spacing="0.3">
      <text x="34" y="244"><tspan fill="#8e8e93">IF</tspan>  fast_conf ≥ 0.8</text>
      <text x="34" y="274" font-weight="900" fill="#007aff" letter-spacing="1.2">  FAST 0.8  ·  SLOW 0.2</text>
      <text x="34" y="322"><tspan fill="#8e8e93">IF</tspan>  fast_conf ≤ 0.5</text>
      <text x="34" y="352" font-weight="900" fill="#af52de" letter-spacing="1.2">  FAST 0.2  ·  SLOW 0.8</text>
    </g>
    <rect x="34" y="386" width="222" height="32" rx="16" ry="16" fill="#f2f2f7" stroke="#e5e5ea"/>
    <text x="145" y="407" text-anchor="middle" font-size="13" font-weight="900" fill="#8e8e93" letter-spacing="1.6">OTHER DIMS  BYPASS  FUSION</text>
  </g>

  <!-- STAGE 4 — UNIFIED DRIVER STATUS -->
  <g transform="translate(1300, 300)" filter="url(#cardShadow)">
    <rect width="340" height="300" rx="22" ry="22" fill="#ffffff" stroke="#e5e5ea" stroke-width="1.2"/>
    <rect x="0" y="34" width="5" height="232" rx="2.5" ry="2.5" fill="#34c759"/>
    <text x="170" y="56" text-anchor="middle" font-size="16" font-weight="900" fill="#34c759" letter-spacing="3.2">STAGE 04  ·  UNIFIED STATUS</text>
    <!-- risk dial -->
    <g transform="translate(170, 156)">
      <path d="M -70 35 A 70 70 0 1 1 70 35" fill="none" stroke="#e5e5ea" stroke-width="10" stroke-linecap="round"/>
      <path d="M -70 35 A 70 70 0 0 1 35 -60" fill="none" stroke="#34c759" stroke-width="10" stroke-linecap="round"/>
      <text x="0" y="12" text-anchor="middle" font-size="56" font-weight="900" fill="#1c1c1e" letter-spacing="-2">2.4</text>
      <text x="0" y="36" text-anchor="middle" font-size="14" font-weight="900" fill="#8e8e93" letter-spacing="2.2">/10  DRIVER OK</text>
    </g>
    <rect x="36" y="238" width="268" height="46" rx="23" ry="23" fill="url(#pillGreen)"/>
    <text x="170" y="267" text-anchor="middle" font-size="18" font-weight="900" fill="#ffffff" letter-spacing="2.5">ALL SYSTEMS NOMINAL</text>
  </g>

  <!-- STAGE 5 — DOWNSTREAM -->
  <g transform="translate(1300, 630)" filter="url(#cardShadow)">
    <rect width="340" height="240" rx="22" ry="22" fill="#ffffff" stroke="#e5e5ea" stroke-width="1.2"/>
    <rect x="0" y="34" width="5" height="172" rx="2.5" ry="2.5" fill="#5856d6"/>
    <text x="170" y="56" text-anchor="middle" font-size="16" font-weight="900" fill="#5856d6" letter-spacing="3.2">STAGE 05  ·  DOWNSTREAM</text>
    <g font-size="18" font-weight="700" fill="#1c1c1e" letter-spacing="0.3">
      <text x="28" y="100"><tspan font-weight="900" fill="#5856d6">●</tspan>  Cockpit UI &amp; HUD overlay</text>
      <text x="28" y="134"><tspan font-weight="900" fill="#5856d6">●</tspan>  In-vehicle audio / haptic alerts</text>
      <text x="28" y="168"><tspan font-weight="900" fill="#5856d6">●</tspan>  Fleet telemetry API (JSON)</text>
      <text x="28" y="202"><tspan font-weight="900" fill="#5856d6">●</tspan>  Driver coaching &amp; insurance</text>
    </g>
  </g>

  <!-- ============ FLOW ARROWS ============ -->
  <!-- Camera → Fast (input arrow with rate label in clear channel) -->
  <path d="M 270 480 C 295 480, 295 390, 310 390" fill="none" stroke="#007aff" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <rect x="220" y="343" width="90" height="28" rx="14" fill="#ffffff" stroke="#007aff" stroke-width="1.5"/>
  <text x="265" y="362" font-size="15" font-weight="900" fill="#007aff" letter-spacing="1.5" text-anchor="middle">30 FPS</text>

  <!-- Camera → Slow -->
  <path d="M 270 560 C 295 560, 295 700, 310 700" fill="none" stroke="#af52de" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowViolet)"/>
  <rect x="220" y="720" width="90" height="28" rx="14" fill="#ffffff" stroke="#af52de" stroke-width="1.5"/>
  <text x="265" y="739" font-size="15" font-weight="900" fill="#af52de" letter-spacing="1.5" text-anchor="middle">~10 Hz</text>

  <!-- Fast → Fusion (cleaner, shorter, no cluttering label) -->
  <path d="M 890 390 C 925 390, 940 500, 970 500" fill="none" stroke="#007aff" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowBlue)"/>

  <!-- Slow → Fusion -->
  <path d="M 890 700 C 925 700, 940 590, 970 590" fill="none" stroke="#af52de" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowViolet)"/>

  <!-- Bypass path: Slow → Unified Status, dashed, labeled BELOW all cards -->
  <path d="M 890 760 C 1100 760, 1180 720, 1300 560" fill="none" stroke="#af52de" stroke-width="4" stroke-dasharray="12 7" stroke-linecap="round" marker-end="url(#arrowViolet)"/>
  <!-- Labeled pill sitting cleanly below the Fusion card (y > 810) -->
  <rect x="920" y="836" width="360" height="36" rx="18" fill="#ffffff" stroke="#af52de" stroke-width="1.5"/>
  <text x="1100" y="860" font-size="16" font-weight="900" fill="#af52de" letter-spacing="1.5" text-anchor="middle">BYPASS  ·  4 VLM DIMS  +  ACTION</text>

  <!-- Fusion → Unified Status -->
  <path d="M 1260 490 C 1278 470, 1288 450, 1300 450" fill="none" stroke="#1c1c1e" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowDark)"/>

  <!-- Unified → Downstream -->
  <path d="M 1470 600 L 1470 630" fill="none" stroke="#34c759" stroke-width="4" stroke-linecap="round" marker-end="url(#arrowGreen)"/>

  <!-- ============ DIFFERENTIATION STRIP ============ -->
  <g transform="translate(50, 900)" filter="url(#cardShadow)">
    <rect width="1580" height="170" rx="22" ry="22" fill="#ffffff" stroke="#e5e5ea" stroke-width="1"/>
    <text x="30" y="42" font-size="16" font-weight="900" fill="#8e8e93" letter-spacing="3">◈  COMPETITIVE DIFFERENTIATION</text>

    <g transform="translate(30, 80)">
      <text font-size="18" font-weight="900" fill="#ff3b30" letter-spacing="2.2">TRADITIONAL DMS</text>
      <text y="36" font-size="20" font-weight="600" fill="#48484a">Eye closure only  ·  no semantic context</text>
      <text y="66" font-size="20" font-weight="600" fill="#48484a">High false-alarm rate</text>
    </g>
    <g transform="translate(570, 80)">
      <text font-size="18" font-weight="900" fill="#ff9500" letter-spacing="2.2">PURE-VLM PROTOTYPES</text>
      <text y="36" font-size="20" font-weight="600" fill="#48484a">Rich semantics  ·  but too slow (5–10 s)</text>
      <text y="66" font-size="20" font-weight="600" fill="#48484a">Unsafe for safety-critical reactions</text>
    </g>
    <g transform="translate(1100, 80)">
      <text font-size="18" font-weight="900" fill="#34c759" letter-spacing="2.2">◈  SENTINEL DMS</text>
      <text y="36" font-size="20" font-weight="700" fill="#1c1c1e">Fastest reflex  +  deepest reasoning</text>
      <text y="66" font-size="20" font-weight="700" fill="#1c1c1e">Unified by confidence-weighted fusion</text>
    </g>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 1130)" font-size="15" font-weight="800" letter-spacing="2" fill="#8e8e93">
    <text>FAST LOOP</text>  <circle cx="124" cy="-5" r="6" fill="#007aff"/>
    <text x="146">SLOW LOOP</text>  <circle cx="276" cy="-5" r="6" fill="#af52de"/>
    <text x="298">FUSED</text>  <circle cx="384" cy="-5" r="6" fill="#1c1c1e"/>
    <text x="406">SAFE OUTPUT</text>  <circle cx="548" cy="-5" r="6" fill="#34c759"/>
    <text x="570">DOWNSTREAM</text>  <circle cx="722" cy="-5" r="6" fill="#5856d6"/>
  </g>
  <g transform="translate(1630, 1130)" font-size="15" font-weight="800" letter-spacing="2" fill="#8e8e93" text-anchor="end">
    <text>CONFIDENTIAL  ·  BUSINESS PLAN EXHIBIT</text>
  </g>
</svg>
