<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" font-family="SF Pro Display, Helvetica Neue, Inter, Ubuntu Sans, system-ui, sans-serif">
  <defs>
    <!-- Page background: iOS systemGroupedBackground light -->
    <linearGradient id="pageBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f1f1f5"/>
    </linearGradient>

    <!-- Pill gradients (keep vivid for legibility on white) -->
    <linearGradient id="pillBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#007aff"/>
      <stop offset="100%" stop-color="#5ac8fa"/>
    </linearGradient>
    <linearGradient id="pillViolet" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#af52de"/>
      <stop offset="100%" stop-color="#bf5af2"/>
    </linearGradient>
    <linearGradient id="pillGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34c759"/>
      <stop offset="100%" stop-color="#30d158"/>
    </linearGradient>
    <linearGradient id="pillTeal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5ac8fa"/>
      <stop offset="100%" stop-color="#007aff"/>
    </linearGradient>
    <linearGradient id="pillIndigo" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5856d6"/>
      <stop offset="100%" stop-color="#7f7bff"/>
    </linearGradient>

    <!-- Apple-style double card shadow: soft ambient + subtle contact -->
    <filter id="cardShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="6" result="shadow1"/>
      <feFlood flood-color="#0b1220" flood-opacity="0.08"/>
      <feComposite in2="shadow1" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrowBlue" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M1 1 L11 6 L1 11 z" fill="#007aff"/>
    </marker>
    <marker id="arrowViolet" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M1 1 L11 6 L1 11 z" fill="#af52de"/>
    </marker>
    <marker id="arrowDark" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M1 1 L11 6 L1 11 z" fill="#1c1c1e"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M1 1 L11 6 L1 11 z" fill="#34c759"/>
    </marker>
  </defs>

  <!-- ============ BACKGROUND ============ -->
  <rect width="1920" height="1080" fill="url(#pageBg)"/>
  <!-- Very faint dot grid for texture -->
  <g opacity="0.5" fill="#d1d1d6">
    <circle cx="120" cy="120" r="1"/><circle cx="320" cy="120" r="1"/><circle cx="520" cy="120" r="1"/><circle cx="720" cy="120" r="1"/><circle cx="920" cy="120" r="1"/><circle cx="1120" cy="120" r="1"/><circle cx="1320" cy="120" r="1"/><circle cx="1520" cy="120" r="1"/><circle cx="1720" cy="120" r="1"/>
    <circle cx="120" cy="320" r="1"/><circle cx="320" cy="320" r="1"/><circle cx="520" cy="320" r="1"/><circle cx="720" cy="320" r="1"/><circle cx="920" cy="320" r="1"/><circle cx="1120" cy="320" r="1"/><circle cx="1320" cy="320" r="1"/><circle cx="1520" cy="320" r="1"/><circle cx="1720" cy="320" r="1"/>
    <circle cx="120" cy="520" r="1"/><circle cx="320" cy="520" r="1"/><circle cx="520" cy="520" r="1"/><circle cx="720" cy="520" r="1"/><circle cx="920" cy="520" r="1"/><circle cx="1120" cy="520" r="1"/><circle cx="1320" cy="520" r="1"/><circle cx="1520" cy="520" r="1"/><circle cx="1720" cy="520" r="1"/>
    <circle cx="120" cy="720" r="1"/><circle cx="320" cy="720" r="1"/><circle cx="520" cy="720" r="1"/><circle cx="720" cy="720" r="1"/><circle cx="920" cy="720" r="1"/><circle cx="1120" cy="720" r="1"/><circle cx="1320" cy="720" r="1"/><circle cx="1520" cy="720" r="1"/><circle cx="1720" cy="720" r="1"/>
    <circle cx="120" cy="920" r="1"/><circle cx="320" cy="920" r="1"/><circle cx="520" cy="920" r="1"/><circle cx="720" cy="920" r="1"/><circle cx="920" cy="920" r="1"/><circle cx="1120" cy="920" r="1"/><circle cx="1320" cy="920" r="1"/><circle cx="1520" cy="920" r="1"/><circle cx="1720" cy="920" r="1"/>
  </g>

  <!-- ============ HEADER ============ -->
  <g transform="translate(72, 62)">
    <text x="0" y="0" font-size="42" font-weight="900" fill="#007aff">◈</text>
    <text x="56" y="-2" font-size="32" font-weight="900" fill="#1c1c1e" letter-spacing="5">SENTINEL</text>
    <text x="56" y="26" font-size="12" font-weight="800" fill="#8e8e93" letter-spacing="4">DRIVER MONITORING SYSTEM</text>
  </g>

  <g transform="translate(1848, 62)" text-anchor="end">
    <text x="0" y="-2" font-size="13" font-weight="800" fill="#48484a" letter-spacing="3">SYSTEM ARCHITECTURE</text>
    <text x="0" y="24" font-size="11" font-weight="800" fill="#8e8e93" letter-spacing="3">v1.0  ·  DUAL-LOOP  ·  REV A</text>
  </g>

  <!-- Title -->
  <g transform="translate(960, 160)" text-anchor="middle">
    <text x="0" y="0" font-size="52" font-weight="900" fill="#1c1c1e" letter-spacing="-0.5">Dual-Loop Driver Monitoring Architecture</text>
    <text x="0" y="42" font-size="17" font-weight="500" fill="#48484a" letter-spacing="1">Millisecond-reflex physiology  ·  paired with  ·  continuous vision-language reasoning</text>
  </g>

  <!-- ============ MAIN FLOW ============ -->

  <!-- STAGE 1 — CAMERA INPUT -->
  <g transform="translate(72, 400)" filter="url(#cardShadow)">
    <rect width="240" height="240" rx="22" ry="22" fill="#ffffff" stroke="#e5e5ea" stroke-width="1.2"/>
    <!-- left accent bar -->
    <rect x="0" y="28" width="4" height="184" rx="2" ry="2" fill="#5ac8fa"/>
    <text x="120" y="38" text-anchor="middle" font-size="11" font-weight="900" fill="#8e8e93" letter-spacing="2.8">STAGE 01  ·  INPUT</text>
    <!-- camera icon -->
    <g transform="translate(120, 116)">
      <rect x="-46" y="-28" width="92" height="56" rx="10" ry="10" fill="none" stroke="#007aff" stroke-width="2.4"/>
      <circle cx="0" cy="0" r="20" fill="none" stroke="#007aff" stroke-width="2.4"/>
      <circle cx="0" cy="0" r="9" fill="#007aff"/>
      <rect x="26" y="-22" width="12" height="4" rx="1" fill="#007aff"/>
    </g>
    <text x="120" y="180" text-anchor="middle" font-size="17" font-weight="900" fill="#1c1c1e" letter-spacing="1">CABIN CAMERA</text>
    <text x="120" y="204" text-anchor="middle" font-size="11" font-weight="800" fill="#48484a" letter-spacing="2">RGB · 640 × 480 · 30 FPS</text>
    <text x="120" y="224" text-anchor="middle" font-size="10" font-weight="700" fill="#8e8e93" letter-spacing="1.5">SINGLE LOW-COST SENSOR</text>
  </g>

  <!-- STAGE 2a — FAST LOOP -->
  <g transform="translate(412, 290)" filter="url(#cardShadow)">
    <rect width="520" height="216" rx="26" ry="26" fill="#ffffff" stroke="#e5e5ea" stroke-width="1.2"/>
    <rect x="0" y="28" width="4" height="160" rx="2" ry="2" fill="#007aff"/>
    <!-- pill -->
    <rect x="360" y="20" width="140" height="28" rx="14" ry="14" fill="url(#pillBlue)"/>
    <text x="430" y="39" text-anchor="middle" font-size="11" font-weight="900" fill="#ffffff" letter-spacing="2.2">30 FPS · &lt; 50 ms</text>
    <!-- header -->
    <text x="28" y="42" font-size="12" font-weight="900" fill="#007aff" letter-spacing="3.2">◉  STAGE 02A  ·  FAST LOOP</text>
    <text x="28" y="76" font-size="28" font-weight="900" fill="#1c1c1e" letter-spacing="-0.2">Reflex Physiology</text>
    <!-- components -->
    <g font-size="14" font-weight="600" fill="#48484a" letter-spacing="0.2">
      <text x="28" y="118"><tspan font-weight="900" fill="#1c1c1e">MediaPipe FaceMesh</tspan>  —  468 facial landmarks</text>
      <text x="28" y="144"><tspan font-weight="900" fill="#1c1c1e">YOLOv8 dual head</tspan>  —  eye open/closed  +  yawn</text>
      <text x="28" y="170"><tspan font-weight="900" fill="#1c1c1e">EAR + PERCLOS</tspan>  —  6-point ratio  +  10 s sliding window</text>
      <text x="28" y="196"><tspan font-weight="900" fill="#1c1c1e">Fast score 0–10</tspan>  —  microsleep  +  yawn-duration blend</text>
    </g>
  </g>

  <!-- STAGE 2b — SLOW LOOP -->
  <g transform="translate(412, 554)" filter="url(#cardShadow)">
    <rect width="520" height="216" rx="26" ry="26" fill="#ffffff" stroke="#e5e5ea" stroke-width="1.2"/>
    <rect x="0" y="28" width="4" height="160" rx="2" ry="2" fill="#af52de"/>
    <!-- pill -->
    <rect x="370" y="20" width="130" height="28" rx="14" ry="14" fill="url(#pillViolet)"/>
    <text x="435" y="39" text-anchor="middle" font-size="11" font-weight="900" fill="#ffffff" letter-spacing="2.2">~ 0.3 HZ  ·  3 s</text>
    <!-- header -->
    <text x="28" y="42" font-size="12" font-weight="900" fill="#af52de" letter-spacing="3.2">◆  STAGE 02B  ·  SLOW LOOP</text>
    <text x="28" y="76" font-size="28" font-weight="900" fill="#1c1c1e" letter-spacing="-0.2">Semantic Reasoning</text>
    <!-- components -->
    <g font-size="14" font-weight="600" fill="#48484a" letter-spacing="0.2">
      <text x="28" y="118"><tspan font-weight="900" fill="#1c1c1e">Qwen3.5-Omni VLM</tspan>  —  vision-language backbone</text>
      <text x="28" y="144"><tspan font-weight="900" fill="#1c1c1e">5-dimensional JSON</tspan>  —  drowsiness · distraction · anomaly</text>
      <text x="28" y="170" dx="180">                                      occlusion · context</text>
      <text x="28" y="196"><tspan font-weight="900" fill="#1c1c1e">Overall risk</tspan>  +  natural-language  +  recommended action</text>
    </g>
  </g>

  <!-- STAGE 3 — DECISION FUSION -->
  <g transform="translate(1032, 380)" filter="url(#cardShadow)">
    <rect width="360" height="320" rx="28" ry="28" fill="#ffffff" stroke="#e5e5ea" stroke-width="1.4"/>
    <rect x="0" y="40" width="4" height="240" rx="2" ry="2" fill="#1c1c1e"/>
    <text x="180" y="44" text-anchor="middle" font-size="11" font-weight="900" fill="#48484a" letter-spacing="3.2">STAGE 03  ·  FUSION</text>
    <text x="180" y="88" text-anchor="middle" font-size="28" font-weight="900" fill="#1c1c1e" letter-spacing="-0.2">Decision Fusion</text>
    <text x="180" y="116" text-anchor="middle" font-size="13" font-weight="600" fill="#48484a" letter-spacing="0.2">Confidence-weighted drowsiness blend</text>
    <line x1="30" y1="142" x2="330" y2="142" stroke="#e5e5ea" stroke-width="1"/>
    <g font-size="13" font-weight="800" fill="#1c1c1e" letter-spacing="0.4">
      <text x="32" y="172"><tspan fill="#8e8e93">IF</tspan>  fast_conf ≥ 0.8</text>
      <text x="32" y="192" font-weight="900" fill="#007aff" letter-spacing="1.2">  FAST 0.8  ·  SLOW 0.2</text>
      <text x="32" y="222"><tspan fill="#8e8e93">IF</tspan>  fast_conf ≤ 0.5</text>
      <text x="32" y="242" font-weight="900" fill="#af52de" letter-spacing="1.2">  FAST 0.2  ·  SLOW 0.8</text>
      <text x="32" y="272"><tspan fill="#8e8e93">ELSE</tspan>  linear interpolation</text>
    </g>
    <!-- info badge -->
    <rect x="32" y="290" width="296" height="18" rx="9" ry="9" fill="#f2f2f7" stroke="#e5e5ea"/>
    <text x="180" y="303" text-anchor="middle" font-size="10" font-weight="900" fill="#8e8e93" letter-spacing="1.8">OTHER VLM DIMENSIONS BYPASS FUSION</text>
  </g>

  <!-- STAGE 4 — UNIFIED DRIVER STATUS -->
  <g transform="translate(1488, 400)" filter="url(#cardShadow)">
    <rect width="360" height="240" rx="22" ry="22" fill="#ffffff" stroke="#e5e5ea" stroke-width="1.2"/>
    <rect x="0" y="28" width="4" height="184" rx="2" ry="2" fill="#34c759"/>
    <text x="180" y="42" text-anchor="middle" font-size="11" font-weight="900" fill="#34c759" letter-spacing="3.2">STAGE 04  ·  UNIFIED STATUS</text>
    <!-- mini risk dial -->
    <g transform="translate(180, 118)">
      <path d="M -58 28 A 58 58 0 1 1 58 28" fill="none" stroke="#e5e5ea" stroke-width="8" stroke-linecap="round"/>
      <path d="M -58 28 A 58 58 0 0 1 28 -51" fill="none" stroke="#34c759" stroke-width="8" stroke-linecap="round"/>
      <text x="0" y="10" text-anchor="middle" font-size="44" font-weight="900" fill="#1c1c1e" letter-spacing="-1.5">2.4</text>
      <text x="0" y="30" text-anchor="middle" font-size="10" font-weight="900" fill="#8e8e93" letter-spacing="2.2">/10  DRIVER OK</text>
    </g>
    <!-- action pill -->
    <rect x="36" y="184" width="288" height="36" rx="18" ry="18" fill="url(#pillGreen)"/>
    <text x="180" y="207" text-anchor="middle" font-size="14" font-weight="900" fill="#ffffff" letter-spacing="2.5">ALL SYSTEMS NOMINAL</text>
  </g>

  <!-- STAGE 5 — DOWNSTREAM -->
  <g transform="translate(1488, 680)" filter="url(#cardShadow)">
    <rect width="360" height="200" rx="22" ry="22" fill="#ffffff" stroke="#e5e5ea" stroke-width="1.2"/>
    <rect x="0" y="28" width="4" height="144" rx="2" ry="2" fill="#5856d6"/>
    <text x="180" y="42" text-anchor="middle" font-size="11" font-weight="900" fill="#5856d6" letter-spacing="3.2">STAGE 05  ·  DOWNSTREAM</text>
    <g font-size="14" font-weight="600" fill="#48484a" letter-spacing="0.3">
      <text x="30" y="80"><tspan font-weight="900" fill="#5856d6">●</tspan>  <tspan fill="#1c1c1e" font-weight="700">Cockpit UI &amp; HUD overlay</tspan></text>
      <text x="30" y="108"><tspan font-weight="900" fill="#5856d6">●</tspan>  <tspan fill="#1c1c1e" font-weight="700">In-vehicle audio / haptic alerts</tspan></text>
      <text x="30" y="136"><tspan font-weight="900" fill="#5856d6">●</tspan>  <tspan fill="#1c1c1e" font-weight="700">Fleet telemetry API (JSON events)</tspan></text>
      <text x="30" y="164"><tspan font-weight="900" fill="#5856d6">●</tspan>  <tspan fill="#1c1c1e" font-weight="700">Driver coaching &amp; insurance hooks</tspan></text>
    </g>
  </g>

  <!-- ============ FLOW ARROWS ============ -->
  <!-- Camera → Fast -->
  <path d="M 312 480 C 360 480, 372 398, 412 398" fill="none" stroke="#007aff" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="366" y="430" font-size="10" font-weight="900" fill="#007aff" letter-spacing="1.5" text-anchor="middle">30 FPS</text>

  <!-- Camera → Slow -->
  <path d="M 312 560 C 360 560, 372 662, 412 662" fill="none" stroke="#af52de" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowViolet)"/>
  <text x="366" y="620" font-size="10" font-weight="900" fill="#af52de" letter-spacing="1.5" text-anchor="middle">~10 Hz SUBMIT</text>

  <!-- Fast → Fusion -->
  <path d="M 932 398 C 990 398, 1000 498, 1032 498" fill="none" stroke="#007aff" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowBlue)"/>
  <text x="982" y="435" font-size="10" font-weight="900" fill="#007aff" letter-spacing="1.5" text-anchor="middle">drowsiness · conf</text>

  <!-- Slow → Fusion -->
  <path d="M 932 662 C 990 662, 1000 582, 1032 582" fill="none" stroke="#af52de" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowViolet)"/>
  <text x="982" y="634" font-size="10" font-weight="900" fill="#af52de" letter-spacing="1.5" text-anchor="middle">drowsiness</text>

  <!-- Slow → Unified Status (bypass) -->
  <path d="M 932 730 C 1220 730, 1260 640, 1488 520" fill="none" stroke="#af52de" stroke-width="3" stroke-dasharray="10 6" stroke-linecap="round" marker-end="url(#arrowViolet)"/>
  <text x="1200" y="768" font-size="10" font-weight="900" fill="#af52de" letter-spacing="1.5" text-anchor="middle">distraction · anomaly · occlusion · context · action  (BYPASS)</text>

  <!-- Fusion → Unified Status -->
  <path d="M 1392 520 C 1440 520, 1460 520, 1488 520" fill="none" stroke="#1c1c1e" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowDark)"/>
  <text x="1440" y="504" font-size="10" font-weight="900" fill="#1c1c1e" letter-spacing="1.5" text-anchor="middle">fused score</text>

  <!-- Unified → Downstream -->
  <path d="M 1668 640 L 1668 680" fill="none" stroke="#34c759" stroke-width="3" stroke-linecap="round" marker-end="url(#arrowGreen)"/>

  <!-- ============ DIFFERENTIATION STRIP ============ -->
  <g transform="translate(72, 920)" filter="url(#cardShadow)">
    <rect width="1776" height="116" rx="20" ry="20" fill="#ffffff" stroke="#e5e5ea" stroke-width="1"/>
    <text x="32" y="36" font-size="11" font-weight="900" fill="#8e8e93" letter-spacing="3">◈  COMPETITIVE DIFFERENTIATION</text>

    <g transform="translate(32, 60)">
      <text font-size="12" font-weight="900" fill="#ff3b30" letter-spacing="2">TRADITIONAL DMS</text>
      <text y="26" font-size="14" font-weight="600" fill="#48484a">Eye closure only  ·  no semantic context  ·  high false-alarm rate</text>
    </g>
    <g transform="translate(640, 60)">
      <text font-size="12" font-weight="900" fill="#ff9500" letter-spacing="2">PURE-VLM PROTOTYPES</text>
      <text y="26" font-size="14" font-weight="600" fill="#48484a">Rich semantics  ·  but too slow (5–10 s) for safety-critical reactions</text>
    </g>
    <g transform="translate(1200, 60)">
      <text font-size="12" font-weight="900" fill="#34c759" letter-spacing="2">◈  SENTINEL DMS</text>
      <text y="26" font-size="14" font-weight="700" fill="#1c1c1e">Fastest reflex  +  deepest reasoning  ·  unified by confidence-weighted fusion</text>
    </g>
  </g>

  <!-- Footer legend -->
  <g transform="translate(72, 1060)" font-size="10" font-weight="800" letter-spacing="2" fill="#8e8e93">
    <text>FAST LOOP</text>
    <circle cx="90" cy="-4" r="4" fill="#007aff"/>
    <text x="110">SLOW LOOP</text>
    <circle cx="210" cy="-4" r="4" fill="#af52de"/>
    <text x="230">FUSED</text>
    <circle cx="290" cy="-4" r="4" fill="#1c1c1e"/>
    <text x="310">SAFE OUTPUT</text>
    <circle cx="430" cy="-4" r="4" fill="#34c759"/>
    <text x="450">DOWNSTREAM</text>
    <circle cx="580" cy="-4" r="4" fill="#5856d6"/>
  </g>
  <g transform="translate(1848, 1060)" font-size="10" font-weight="800" letter-spacing="2" fill="#8e8e93" text-anchor="end">
    <text>CONFIDENTIAL  ·  BUSINESS PLAN EXHIBIT</text>
  </g>
</svg>
